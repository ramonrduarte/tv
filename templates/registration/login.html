<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — IPTV Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-4xl">📺</span>
      <h1 class="text-white text-2xl font-bold mt-3">IPTV Manager</h1>
      <p class="text-slate-400 text-sm mt-1">Acesse sua conta para continuar</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      {% if form.errors %}
      <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        Usuário ou senha incorretos. Tente novamente.
      </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Usuário</label>
          <input type="text" name="username" autofocus required
                 class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="Seu usuário" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <input type="password" name="password" required
                 class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="Sua senha" />
        </div>
        <input type="hidden" name="next" value="{{ next }}" />
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg text-sm transition">
          Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
